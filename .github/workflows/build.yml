name: Build Mods

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.2.1

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build main mod (STRenderer)
        run: ./gradlew build

      - name: Prepare local repository for demonstration mod
        run: |
          mkdir -p Demonstration/repo
          cp build/libs/*.jar Demonstration/repo/

      - name: Build demonstration mod
        working-directory: Demonstration
        run: gradle build

      - name: Upload main mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: strenderer-main
          path: build/libs/*.jar

      - name: Upload demonstration mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: strenderer-demo
          path: Demonstration/build/libs/*.jar
